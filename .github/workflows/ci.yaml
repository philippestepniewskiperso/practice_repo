name: test_and_code_quality_check
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  test_and_code_quality_check:
    runs-on: ubuntu-latest
    steps:

    - name: Check out repository code
      uses: actions/checkout@v5
    - name: List files in the repository
      run: |
        ls ${{ github.workspace }}
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
    - name : install python
      run : |
        uv python install 3.12
    - name: Install dependencies
      run: |
        uv sync --group dev
    - name : pytest
      run : |
        uv run pytest -v tests/

  build_and_push_docker:
    runs-on: ubuntu-latest
    needs: test_and_code_quality_check
    steps:
    - name: Check out repository code
      uses: actions/checkout@v5-
    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: "."
        push: true
        tags: mame/demo_app:latest
